<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>שובר לארוחה - נורמה</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f6f1e8;
      display: flex;
      align-items: center;
      justify-content: center;
      /* height: 100vh; */
      font-family: 'Heebo', sans-serif;
      display: grid;
      gap:2em;
      margin-block: 2em;

    }

    .voucher {
      width: 760px;
      /* height: 360px; */
      background: linear-gradient(145deg, #fffdf9, #f3eadf);
      border-radius: 20px;
      border: 1px solid #d8cbb4;
      padding: 24px 32px 26px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      margin: 2em;

    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .logo {
      width: 120px;
    }

    .serial {
      font-size: 12px;
      color: #8a7a66;
      letter-spacing: 1px;
      text-align: left;
    }

    /* barcode */
    .barcode-wrapper {
      text-align: center;
      margin-top: -8px;
      margin-bottom: -6px;
    }

    .barcode {
      height: 80px;
      opacity: 0.9;
    }

    .barcode-number {
      font-size: 11px;
      letter-spacing: 2px;
      color: #7d6c59;
      margin-top: 2px;
    }

    .center {
      text-align: center;
      margin-bottom: 1rem;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      margin: 0 0 6px;
      color: #3b2f23;
    }

    .subtitle {
      font-size: 15px;
      color: #6b5c4c;
      margin: 0;
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .name-block {
      text-align: right;
    }

    .label {
      font-size: 18px;
      color: #9a8a78;
      margin-bottom: 6px;
    }

    .name {
      font-size: 28px;
      font-weight: 500;
      color: #2f2a24;
    }

    .note {
      font-size: 18px;
      color: #8b7c6c;
      text-align: left;
      max-width: 260px;
      line-height: 1.4;
    }

    @media print {
      body {
        background: white;
        height: auto;
      }

      .voucher {
        box-shadow: none;
      }
    }
  </style>
</head>
<body onload="onInit()">
